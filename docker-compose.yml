# Version de la syntaxe Docker Compose
version: '3.9'
 
services:
 
  # ── Application Flask ────────────────────────────────────
  app:
    # On construit l'image depuis notre Dockerfile
    build:
      context: .           # Dossier racine du projet
      dockerfile: docker/Dockerfile
      target: production   # On utilise l'étape 'production'
    # On ne publie PAS le port 5000 publiquement.
    # Seul Nginx y accède en interne.
    expose:
      - '5000'
    environment:
      - APP_VERSION=dev-local
    # L'app attend que la DB soit prête avant de démarrer
    depends_on:
      db:
        condition: service_healthy
    # Redémarre automatiquement si crash
    restart: unless-stopped
 
  # ── Nginx — reverse proxy ────────────────────────────────
  nginx:
    image: nginx:alpine      # Image officielle Nginx légère
    ports:
      - '80:80'              # Port 80 local → port 80 du container
    volumes:
      # On monte notre config Nginx dans le container
      # ':ro' = read-only (le container ne peut pas modifier le fichier)
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
 
  # ── PostgreSQL — base de données ─────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      # En dev local, on met le mot de passe en clair.
      # En prod, on utilisera des secrets GitHub. Voir chapitre 5.
      POSTGRES_PASSWORD: devpassword
    volumes:
      # Volume nommé pour persister les données même si on recrée le container
      - pgdata:/var/lib/postgresql/data
    # Healthcheck : Docker attend que Postgres accepte les connexions
    # avant d'autoriser Flask à démarrer
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appuser -d appdb']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
 
  # ── Prometheus — collecte des métriques ──────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'     # Interface web Prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
 
  # ── Grafana — visualisation des métriques ────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - '3000:3000'     # Interface web Grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
 
# Volumes nommés : Docker gère leur emplacement sur le disque.
# Les données persistent même si tu fais 'docker compose down'.
# 'docker compose down -v' les supprime.
volumes:
  pgdata:
  prometheus_data:
  grafana_data:
